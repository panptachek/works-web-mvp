<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Works DB MVP{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link href="/static/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg nav-shell mb-4">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">WORKS DB</a>
    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 flex-wrap gap-1">
        {% for href, title in nav %}
        <li class="nav-item"><a class="nav-link" href="{{ href }}">{{ title }}</a></li>
        {% endfor %}
      </ul>
      <div class="d-flex gap-2 small flex-wrap">
        <span class="status-pill status-yellow">Черновики {{ header_stats.drafts }}</span>
        <span class="status-pill status-red">Работы {{ header_stats.work_items_today }}</span>
        <span class="status-pill status-red">Перевозки {{ header_stats.movements_today }}</span>
        <span class="status-pill status-red">Техника {{ header_stats.equipment_today }}</span>
      </div>
    </div>
  </div>
</nav>
<div class="container-fluid px-4 pb-5">
  <div class="row justify-content-center">
    <div class="col-12 col-xxl-11">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
</body>
</html>
