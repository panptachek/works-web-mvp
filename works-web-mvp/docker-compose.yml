services:
  web:
    build: .
    container_name: works_web_mvp
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - default
      - worksdb

  nginx:
    image: nginx:1.27-alpine
    container_name: works_web_mvp_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_PORT:-8082}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - worksdb

networks:
  worksdb:
    external: true
    name: works-system-v2_default
