services:
  web:
    build: .
    container_name: works_web_mvp
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: works_web_mvp_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${NGINX_PORT:-8082}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
